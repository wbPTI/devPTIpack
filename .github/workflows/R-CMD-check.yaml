# R CMD check gate. Catches Rd / NAMESPACE / examples / vignette issues
# that the testthat-only workflow misses. Mirrors the trigger surface of
# tests.yaml. Single Ubuntu / R-release cell — this is a documentation-
# drift guard, not portability QA. Widen the matrix later if a Windows-
# or oldrel-only bug actually appears.
on:
  push:
    branches: [main, koichi-arch-redesign]
  pull_request:
    branches: [main, koichi-arch-redesign]
  workflow_dispatch:

name: R-CMD-check

jobs:
  R-CMD-check:
    runs-on: ubuntu-latest
    name: ubuntu-latest (R-release)

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes
      NOT_CRAN: true
      _R_CHECK_FORCE_SUGGESTS_: false

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: 'release'
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::rcmdcheck
          needs: check

      - uses: r-lib/actions/check-r-package@v2
        with:
          upload-snapshots: true
          error-on: '"error"'
          args: 'c("--no-manual", "--as-cran")'
