<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 530" font-family="'Segoe UI', Arial, Helvetica, sans-serif" font-size="13">
  <defs>
    <marker id="arrow" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <path d="M0,0 L7,2.5 L0,5 Z" fill="#6c757d"/>
    </marker>
    <style>
      .box { rx: 5; ry: 5; stroke-width: 1.4; }
      .lbl { text-anchor: middle; fill: #fff; font-weight: 600; font-size: 12.5px; }
      .lbl-sm { text-anchor: middle; fill: #fff; font-size: 10.5px; }
      .lbl-dk { text-anchor: middle; fill: #343a40; font-weight: 600; font-size: 12px; }
      .lbl-sub { text-anchor: middle; fill: #6c757d; font-size: 10.5px; }
      .hd { text-anchor: middle; fill: #6c757d; font-weight: 700; font-size: 10.5px; letter-spacing: 0.7px; }
      .conn { stroke: #adb5bd; stroke-width: 1.3; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1100" height="530" fill="#f8f9fa" rx="6"/>

  <!-- ── ROW 1: Two parallel streams ──────────────────────── -->

  <!-- Stream A heading -->
  <text x="220" y="24" class="hd">STREAM A — SPATIAL BOUNDARIES</text>

  <!-- Stream B heading -->
  <text x="790" y="24" class="hd">STREAM B — INDICATOR DATA</text>

  <!-- Stream A: Shapefiles box -->
  <rect x="120" y="38" width="200" height="58" class="box" fill="#4A8FE7" stroke="#3A73C0"/>
  <text x="220" y="62" class="lbl">Country Shapefiles</text>
  <text x="220" y="78" class="lbl-sm">ADM 0, 1, 2, 3 + Hex grid</text>

  <!-- Stream B: Three source boxes -->
  <rect x="575" y="38" width="145" height="58" class="box" fill="#E8913A" stroke="#CC7A2A"/>
  <text x="648" y="60" class="lbl" font-size="11">Precomputed</text>
  <text x="648" y="74" class="lbl" font-size="11">Socioeconomic Stats</text>

  <rect x="730" y="38" width="125" height="58" class="box" fill="#E8913A" stroke="#CC7A2A"/>
  <text x="793" y="60" class="lbl" font-size="11">Zonal Statistics</text>
  <text x="793" y="76" class="lbl-sm" fill="#fde8cc">(optional)</text>

  <rect x="865" y="38" width="125" height="58" class="box" fill="#E8913A" stroke="#CC7A2A"/>
  <text x="928" y="60" class="lbl" font-size="11">Hex-Level Data</text>
  <text x="928" y="76" class="lbl-sm" fill="#fde8cc">(optional, API)</text>

  <!-- ── ROW 2: Intermediate processing ───────────────────── -->

  <!-- Stream A: Cleaning box -->
  <rect x="120" y="130" width="200" height="50" class="box" fill="#5A9FEE" stroke="#4585CC"/>
  <text x="220" y="152" class="lbl">Cleaning &amp; Validation</text>
  <text x="220" y="166" class="lbl-sm">Mapping + Hex grid</text>

  <!-- Arrow: Shapefiles → Cleaning -->
  <line x1="220" y1="96" x2="220" y2="130" class="conn"/>

  <!-- Stream B: Two metadata boxes -->
  <rect x="595" y="130" width="170" height="50" class="box" fill="#fff3e0" stroke="#E8913A"/>
  <text x="680" y="153" class="lbl-dk" font-size="11.5">metadata-user.xlsx</text>
  <text x="680" y="168" class="lbl-sub">User indicators + dictionary</text>

  <rect x="790" y="130" width="170" height="50" class="box" fill="#fff3e0" stroke="#E8913A"/>
  <text x="875" y="153" class="lbl-dk" font-size="11.5">metadata-hex.xlsx</text>
  <text x="875" y="168" class="lbl-sub">Hex-sourced indicators</text>

  <!-- Arrows: Sources → Metadata boxes -->
  <line x1="648" y1="96" x2="660" y2="130" class="conn"/>
  <line x1="793" y1="96" x2="700" y2="130" class="conn"/>
  <line x1="793" y1="96" x2="860" y2="130" class="conn"/>
  <line x1="928" y1="96" x2="890" y2="130" class="conn"/>

  <!-- ── ROW 3: Compile ──────────────────────────────────── -->

  <rect x="400" y="218" width="250" height="48" class="box" fill="#28a745" stroke="#1e7e34"/>
  <text x="525" y="240" class="lbl" font-size="14">compile_pti_data()</text>
  <text x="525" y="256" class="lbl-sm">Merge · Validate · Export</text>

  <!-- Arrows into Compile -->
  <line x1="220" y1="180" x2="440" y2="218" class="conn"/>
  <line x1="680" y1="180" x2="560" y2="218" class="conn"/>
  <line x1="875" y1="180" x2="600" y2="218" class="conn"/>

  <!-- ── ROW 4: Five output files in one line ────────────── -->

  <text x="525" y="295" class="hd">DEPLOYMENT FILES</text>

  <rect x="55" y="308" width="140" height="48" class="box" fill="#e9ecef" stroke="#adb5bd"/>
  <text x="125" y="328" class="lbl-dk" font-size="11">shapes.rds</text>
  <text x="125" y="344" class="lbl-sub" font-size="9">Admin boundaries</text>

  <rect x="215" y="308" width="150" height="48" class="box" fill="#e9ecef" stroke="#adb5bd"/>
  <text x="290" y="328" class="lbl-dk" font-size="11">metadata.xlsx</text>
  <text x="290" y="344" class="lbl-sub" font-size="9">Indicators + data</text>

  <rect x="385" y="308" width="150" height="48" class="box" fill="#e9ecef" stroke="#adb5bd"/>
  <text x="460" y="328" class="lbl-dk" font-size="11">shapefiles.zip</text>
  <text x="460" y="344" class="lbl-sub" font-size="9">GeoJSON download</text>

  <rect x="555" y="308" width="165" height="48" class="box" fill="#e9ecef" stroke="#adb5bd"/>
  <text x="638" y="328" class="lbl-dk" font-size="11">pti-metadata.pdf</text>
  <text x="638" y="344" class="lbl-sub" font-size="9">Indicator atlas</text>

  <rect x="740" y="308" width="160" height="48" class="box" fill="#fff8e1" stroke="#ffc107"/>
  <text x="820" y="328" class="lbl-dk" font-size="11">landing-page.md</text>
  <text x="820" y="344" class="lbl-sub" font-size="9">Manually authored</text>

  <!-- Arrows from Compile to output files -->
  <line x1="460" y1="266" x2="125" y2="308" class="conn"/>
  <line x1="490" y1="266" x2="290" y2="308" class="conn"/>
  <line x1="525" y1="266" x2="460" y2="308" class="conn"/>
  <line x1="560" y1="266" x2="638" y2="308" class="conn"/>

  <!-- ── ROW 5: PTI Web App ──────────────────────────────── -->

  <rect x="310" y="385" width="340" height="48" class="box" fill="#5a6268" stroke="#495057"/>
  <text x="480" y="408" class="lbl" font-size="15">PTI Web App</text>
  <text x="480" y="424" class="lbl-sm" fill="#ced4da">Shiny dashboard · devPTIpack</text>

  <!-- Arrows from files to Web App -->
  <line x1="125" y1="356" x2="380" y2="397" class="conn"/>
  <line x1="290" y1="356" x2="420" y2="397" class="conn"/>
  <line x1="460" y1="356" x2="460" y2="397" class="conn"/>
  <line x1="638" y1="356" x2="530" y2="397" class="conn"/>
  <line x1="820" y1="356" x2="580" y2="397" class="conn"/>

  <!-- ── ROW 6: Three outputs ────────────────────────────── -->

  <rect x="240" y="470" width="150" height="42" class="box" fill="#d1ecf1" stroke="#86cfda"/>
  <text x="315" y="494" class="lbl-dk" font-size="12.5">Interactive Maps</text>

  <rect x="420" y="470" width="150" height="42" class="box" fill="#d6d8db" stroke="#adb5bd"/>
  <text x="495" y="494" class="lbl-dk" font-size="12.5">PTI Index</text>

  <rect x="600" y="470" width="150" height="42" class="box" fill="#ffeeba" stroke="#ffc107"/>
  <text x="675" y="494" class="lbl-dk" font-size="12.5">Data Explorer</text>

  <!-- Arrows from Web App to outputs -->
  <line x1="420" y1="433" x2="315" y2="470" class="conn"/>
  <line x1="480" y1="433" x2="495" y2="470" class="conn"/>
  <line x1="540" y1="433" x2="675" y2="470" class="conn"/>

</svg>
