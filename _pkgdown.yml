# Reference page groupings: driven by roxygen2 @family tags via
# pkgdown's has_concept() selector. To regroup a function, edit its
# @family tag in R/ rather than editing this list. See issue #75.
reference:
  - title: Launch a PTI app
    desc: Entry points that scaffold a project and serve the Shiny dashboard.
    contents:
      - has_concept("pti-launch")
  - title: Calculation pipeline
    desc: Compute scores, label outputs, and compile deployment artefacts.
    contents:
      - has_concept("pti-pipeline")
  - title: Data input
    desc: Read shapes and metadata workbooks from disk.
    contents:
      - has_concept("data-input")
  - title: Weighting schemes
    desc: Build weight sets passed to the calculation pipeline.
    contents:
      - has_concept("weights")
  - title: Data export
    desc: Bundle scores and weight tables for the dashboard's download buttons.
    contents:
      - has_concept("data-export")
  - title: Input validation
    desc: Structural and visual checks on shapes and metadata inputs.
    contents:
      - has_concept("validation")
  - title: Visualisation helpers
    desc: ggplot2-based map builders shared by the dashboard and the PDF render.
    contents:
      - has_concept("visualisation")
  - title: Shiny modules
    desc: The reactive building blocks behind `launch_pti()`.
    contents:
      - has_concept("shiny-modules")
  - title: Package utilities
    desc: golem boilerplate and resource resolvers.
    contents:
      - has_concept("package-utilities")
  - title: Bundled sample data
    desc: Datasets ready to feed the pipeline. Rwanda for user-facing examples; Ukraine for the test suite.
    contents:
      - has_concept("sample-data")
