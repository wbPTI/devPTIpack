url: https://worldbank.github.io/devPTIpack/

home:
  title: devPTIpack — Project Targeting Index for Shiny Dashboards
  description: >
    A framework for building geo-spatial Project Targeting Index (PTI)
    dashboards. Combine socioeconomic indicators, aggregate them using a
    flexible weighting scheme, and visualise PTI scores across administrative
    levels in an interactive Shiny application.
  links:
    - text: Report a bug
      href: https://github.com/worldbank/devPTIpack/issues/new
    - text: Browse source code
      href: https://github.com/worldbank/devPTIpack
    - text: Cite this package
      href: authors.html#citation
    - text: License (MIT)
      href: LICENSE-text.html
    - text: World Bank IGO License Rider
      href: WB-IGO-RIDER.html

